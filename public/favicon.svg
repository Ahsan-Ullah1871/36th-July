<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- dark background -->
  <rect width="64" height="64" fill="#160f08"/>

  <!-- inner border frame -->
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#4a3a26" stroke-width="1.5"/>

  <!-- blood-red bottom accent line -->
  <rect x="3" y="56" width="58" height="3" fill="#d33322"/>
  <!-- subtle glow on red line -->
  <rect x="3" y="55" width="58" height="1" fill="#7a1a12" opacity="0.6"/>

  <!-- "৩৬" in gold — uses system serif/fallback; Bengali digits are Unicode -->
  <text
    x="32"
    y="43"
    font-family="'Noto Serif Bengali', 'Hind Siliguri', Georgia, serif"
    font-weight="900"
    font-size="30"
    fill="#ffd54a"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-1"
  >৩৬</text>
</svg>
